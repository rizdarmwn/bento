services:
  bento-app:
    build: .
    ports:
      - 3000:3000
    environment:
      PORT: ":3000"
      APP_VERSION: "0.1"

  redis:
    image: redis:8.6.1-alpine
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS="--requirepass $$(cat /run/secrets/redis_pass) --appendonly yes"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2.4-alpine
    ports:
      - 15672:15672
      - 5672:5672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: /run/secrets/rabbitmq_user
      RABBITMQ_DEFAULT_PASS: /run/secrets/rabbitmq_pass

  db:
    image: postgres:18.3-alpine
    restart: always
    shm_size: 256mb
    environment:
      POSTGRES_PASSWORD: /run/secrets/postgres_pass
      POSTGRES_DB: /run/secrets/postgres_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  redis-data:
  postgres-data:
  rabbitmq-data:

secrets:
  redis_pass:
    file: ./secrets/redis_pass.txt
  postgres_pass:
    file: ./secrets/postgres_pass.txt
  postgres_db:
    file: ./secrets/postgres_db.txt
  rabbitmq_pass:
    file: ./secrets/rabbitmq_pass.txt
  rabbitmq_user:
    file: ./secrets/rabbitmq_user.txt
